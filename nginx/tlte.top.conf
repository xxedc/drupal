server {
    listen 80;
    server_name tlte.top www.tlte.top;
    return 301 https://tlte.top$request_uri;
}

server {
    listen 443 ssl http2;
    server_name tlte.top www.tlte.top;
    root /var/www/drupal/web;
    index index.php;

    ssl_certificate /etc/letsencrypt/live/tlte.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tlte.top/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # CSS/JS 聚合文件：不存在时交给 PHP 生成
    location ~* /sites/default/files/(css|js)/ {
        try_files $uri @drupal;
    }

    location @drupal {
        rewrite ^ /index.php last;
    }

    location / {
        try_files $uri /index.php?$query_string;
    }

    location ~ '\.php$|^/update.php' {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout 300;
    }

    location ~* \.(jpg|jpeg|png|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    location ~ /\. { deny all; }
    location ^~ /vendor/ { deny all; }
}
